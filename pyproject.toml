[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ppo-smc-asset-allocation"
version = "0.1.0"
description = "PPO + SMC multi-asset allocation research code (data ingestion, feature engine, RL training)."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Proprietary — research use" }
authors = [{ name = "DaYi-TW" }]

# Runtime deps. Versions deliberately constrained per spec 002 plan.md and
# research.md decisions; lock file (requirements-lock.txt) pins exact patch
# versions for byte-identical reproduction.
dependencies = [
    "yfinance~=0.2.40",
    "fredapi~=0.5.2",
    "pyarrow~=15.0",
    "pandas>=2.0,<3.0",
    "tenacity~=8.2",
    "jsonschema>=4.20,<5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-cov>=4.1,<6.0",
    "vcrpy>=6.0,<7.0",
    "ruff>=0.4,<1.0",
    "mypy>=1.8,<2.0",
    "pip-tools>=7.4,<8.0",
]

[project.scripts]
ppo-smc-data = "data_ingestion.cli:main"

[project.urls]
Homepage = "https://github.com/DaYi-TW/ppo-smc-asset-allocation"

[tool.setuptools.packages.find]
where = ["src"]
include = ["data_ingestion*", "smc_features*"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
filterwarnings = [
    "error",
    # yfinance occasionally emits FutureWarning from pandas internals; ignore
    # only those with explicit known sources to keep warnings-as-errors useful.
    "ignore::DeprecationWarning:yfinance",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]  # line-length handled by formatter

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]
warn_unused_ignores = true
warn_redundant_casts = true

[tool.coverage.run]
source = ["data_ingestion", "smc_features"]
branch = true

[tool.coverage.report]
fail_under = 90
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
