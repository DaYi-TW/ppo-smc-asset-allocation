openapi: 3.1.0
info:
  title: PPO Inference Service
  description: |
    Python AI 引擎一層的 PPO 推理 HTTP 微服務（C-lite 版，2026-05-06 重寫）。

    包裝 `src/ppo_training/predict.py` 為 HTTP service，內建 APScheduler 每日 ET 16:30 自動產出
    隔日目標權重 + 支援 on-demand 重跑。結果發到 Redis pub/sub channel `predictions:latest`，
    供 006 Spring Gateway 訂閱並廣播給 007 React War Room。

    對應 005-inference-service spec.md（2026-05-06 重寫版本）。
  version: 2.0.0
  contact:
    name: PPO-SMC Asset Allocation Team

servers:
  - url: http://localhost:8000
    description: 本機 docker-compose
  - url: https://inference.{zeabur_subdomain}.zeabur.app
    description: Zeabur 部署
    variables:
      zeabur_subdomain:
        default: ppo-smc

paths:
  /infer/run:
    post:
      operationId: triggerInference
      summary: On-demand 觸發一次推理
      description: |
        手動觸發 PPO inference，回傳隔日目標配置。共用內部 inference handler（與 scheduled cron 相同），
        互斥執行（同一時刻只允許一次推理）。完成後同樣 publish 到 Redis channel + 寫入 Redis key。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: 推理成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionPayload'
        '409':
          description: 另一個 inference 進行中（mutex 拒絕）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 服務尚未 ready（policy 未載入完成）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 推理失敗（policy 例外、資料異常等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /infer/latest:
    get:
      operationId: getLatestPrediction
      summary: 取最新一筆 prediction（從 Redis cache 讀）
      description: |
        從 Redis key `predictions:latest` 直接讀回最近一次 inference 的結果。不觸發新推理。
        若服務啟動後尚未產出任何 prediction，或 Redis 中該 key 已過 TTL（7 天），回 404。
      responses:
        '200':
          description: 找到 prediction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionPayload'
        '404':
          description: 尚無 prediction（從未產出 / 已過期）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Redis 連不上
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /healthz:
    get:
      operationId: healthCheck
      summary: 服務健康檢查
      description: |
        回傳 process 存活與 policy / redis 連通狀態，供 docker-compose healthcheck 與 Zeabur health probe 用。
      responses:
        '200':
          description: 服務健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 服務退化（policy 載入失敗或 redis 不通）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /openapi.json:
    get:
      operationId: getOpenApiSpec
      summary: OpenAPI 3.1 spec（FastAPI 自動產出）
      responses:
        '200':
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    TargetWeights:
      type: object
      required: [NVDA, AMD, TSM, MU, GLD, TLT, CASH]
      properties:
        NVDA: { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        AMD:  { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        TSM:  { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        MU:   { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        GLD:  { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        TLT:  { type: number, format: float, minimum: 0.0, maximum: 1.0 }
        CASH: { type: number, format: float, minimum: 0.0, maximum: 1.0 }

    PredictionContext:
      type: object
      required: [data_root, include_smc, n_warmup_steps, current_nav_at_as_of]
      properties:
        data_root:               { type: string }
        include_smc:             { type: boolean }
        n_warmup_steps:          { type: integer }
        current_nav_at_as_of:    { type: number, format: double }

    PredictionPayload:
      type: object
      required:
        - as_of_date
        - next_trading_day_target
        - policy_path
        - deterministic
        - target_weights
        - weights_capped
        - renormalized
        - context
        - triggered_by
        - inference_id
        - inferred_at_utc
      properties:
        as_of_date:              { type: string, format: date, example: "2026-05-04" }
        next_trading_day_target: { type: string, example: "first session after 2026-05-04 (apply at next open)" }
        policy_path:             { type: string }
        deterministic:           { type: boolean }
        target_weights:          { $ref: '#/components/schemas/TargetWeights' }
        weights_capped:          { type: boolean }
        renormalized:            { type: boolean }
        context:                 { $ref: '#/components/schemas/PredictionContext' }
        triggered_by:
          type: string
          enum: [scheduled, manual]
        inference_id:            { type: string, format: uuid }
        inferred_at_utc:         { type: string, format: date-time }

    HealthResponse:
      type: object
      required: [status, uptime_seconds, policy_loaded, redis_reachable]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        uptime_seconds:           { type: integer }
        policy_loaded:            { type: boolean }
        redis_reachable:          { type: boolean }
        last_inference_at_utc:    { type: string, format: date-time, nullable: true }
        next_scheduled_run_utc:   { type: string, format: date-time, nullable: true }

    ErrorResponse:
      type: object
      required: [code, message, error_id, timestamp_utc]
      properties:
        code:                     { type: string, example: "INFERENCE_BUSY" }
        message:                  { type: string }
        error_id:                 { type: string, format: uuid }
        timestamp_utc:            { type: string, format: date-time }
