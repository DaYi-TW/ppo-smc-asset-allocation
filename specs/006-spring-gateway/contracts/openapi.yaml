openapi: 3.1.0
info:
  title: PPO-SMC War Room Gateway (C-lite)
  description: |
    Spring Boot API Gateway，作為 React 戰情室（007）與 Python 推理服務（005）間的中介層。
    C-lite v2（2026-05-06）：REST proxy + SSE broadcaster；無 Kafka / 無 RDBMS / 無 JWT。
    對應 specs/006-spring-gateway/spec.md C-lite v2。
    所有 endpoint 採 camelCase JSON、ISO 8601 日期。
  version: 2.0.0
servers:
  - url: http://localhost:8080
    description: Local development（docker-compose）
  - url: https://gateway.warroom.example.com
    description: Production（Zeabur）

paths:
  /api/v1/inference/run:
    post:
      summary: 觸發一次 PPO 推理
      description: |
        Proxy 至 005 POST /infer/run。Gateway 加 requestId、轉 camelCase。
        timeout 90 秒（含 005 env warmup ~30s）。
      operationId: runInference
      responses:
        '200':
          description: 成功，回 PredictionPayload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionPayload'
        '409':
          description: 005 mutex busy（INFERENCE_BUSY 透傳）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 005 服務不可達
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: 005 呼叫超過 90 秒
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/inference/latest:
    get:
      summary: 取最新一筆 prediction（從 005 cache）
      description: Proxy 至 005 GET /infer/latest。timeout 5 秒。
      operationId: getLatestInference
      responses:
        '200':
          description: 回最新 PredictionPayload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionPayload'
        '404':
          description: cache 內無 prediction（PredictionNotReady）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 005 / Redis 不可達
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/inference/healthz:
    get:
      summary: 005 自身健康狀態（pass-through）
      description: |
        Proxy 至 005 GET /healthz。回應為 005 HealthResponse；
        本端點與 /actuator/health（Gateway 自身）不同。
      operationId: getInferenceHealth
      responses:
        '200':
          description: 005 ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceHealth'
        '503':
          description: 005 degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceHealth'

  /api/v1/predictions/stream:
    get:
      summary: SSE 即時廣播 prediction 事件
      description: |
        訂閱 005 push 到 Redis channel `predictions:latest` 的事件，以 Server-Sent Events
        廣播。連線建立時立即送一筆 initial state（從 005 /infer/latest 取）。
        每 15 秒 keep-alive comment（":\n\n"）。Redis 斷線時切 polling fallback
        並送一次 `event: degraded`。
      operationId: streamPredictions
      responses:
        '200':
          description: SSE stream（text/event-stream）
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE wire format：
                  ```
                  event: prediction
                  data: {"eventType":"prediction","emittedAtUtc":"...","payload":{...}}

                  ```

  /actuator/health:
    get:
      summary: Gateway 自身健康狀態
      description: |
        Spring Boot Actuator 標準回應；含自訂 components：
        - `inference`：HTTP probe 005 /healthz
        - `redis`：Lettuce ping
        任一 DOWN 整體 DOWN.
      operationId: getGatewayHealth
      responses:
        '200':
          description: status=UP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayHealth'
        '503':
          description: status=DOWN（任一 component down）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayHealth'

components:
  schemas:
    PredictionPayload:
      type: object
      required:
        - asOfDate
        - nextTradingDayTarget
        - policyPath
        - deterministic
        - targetWeights
        - weightsCapped
        - renormalized
        - context
        - triggeredBy
        - inferenceId
        - inferredAtUtc
      properties:
        asOfDate:
          type: string
          format: date
          example: "2026-04-28"
        nextTradingDayTarget:
          type: string
          example: "first session after 2026-04-28 (apply at next open)"
        policyPath:
          type: string
        deterministic:
          type: boolean
        targetWeights:
          type: object
          additionalProperties:
            type: number
            format: double
          example: {"NVDA": 0.1, "AMD": 0.1, "TSM": 0.1, "MU": 0.1, "GLD": 0.1, "TLT": 0.1, "CASH": 0.4}
        weightsCapped:
          type: boolean
        renormalized:
          type: boolean
        context:
          $ref: '#/components/schemas/PredictionContext'
        triggeredBy:
          type: string
          enum: [manual, scheduled]
        inferenceId:
          type: string
          format: uuid
        inferredAtUtc:
          type: string
          format: date-time

    PredictionContext:
      type: object
      required:
        - dataRoot
        - includeSmc
        - nWarmupSteps
        - currentNavAtAsOf
      properties:
        dataRoot:
          type: string
        includeSmc:
          type: boolean
        nWarmupSteps:
          type: integer
        currentNavAtAsOf:
          type: number
          format: double

    InferenceHealth:
      type: object
      required:
        - status
        - uptimeSeconds
        - policyLoaded
        - redisReachable
      properties:
        status:
          type: string
          enum: [ok, degraded]
        uptimeSeconds:
          type: integer
        policyLoaded:
          type: boolean
        redisReachable:
          type: boolean
        lastInferenceAtUtc:
          type: string
          format: date-time
          nullable: true
        nextScheduledRunUtc:
          type: string
          format: date-time
          nullable: true

    GatewayHealth:
      type: object
      required:
        - status
        - components
      properties:
        status:
          type: string
          enum: [UP, DOWN, OUT_OF_SERVICE, UNKNOWN]
        components:
          type: object
          properties:
            inference:
              $ref: '#/components/schemas/HealthComponent'
            redis:
              $ref: '#/components/schemas/HealthComponent'

    HealthComponent:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [UP, DOWN]
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - requestId
      properties:
        error:
          type: string
          enum:
            - InferenceServiceUnavailable
            - InferenceTimeout
            - InferenceBusy
            - PredictionNotReady
            - RedisUnavailable
            - BadRequest
            - InternalServerError
        message:
          type: string
        requestId:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
          nullable: true
