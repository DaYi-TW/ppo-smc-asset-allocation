server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: warroom-gateway
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}
      timeout: 2s
      lettuce:
        shutdown-timeout: 100ms

# 005 推理服務 base URL
inference:
  url: ${INFERENCE_URL:http://localhost:8000}
  timeout:
    run: 90s
    latest: 5s
    healthz: 2s

# Redis pub/sub channel（與 005 配置對齊）
predictions:
  channel: ${REDIS_CHANNEL:predictions:latest}
  sse:
    keep-alive-interval-seconds: 15
    polling-fallback-interval-seconds: 30

# CORS 白名單（逗號分隔）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.dayitw.warroom.gateway: DEBUG
    org.springframework.web: INFO
